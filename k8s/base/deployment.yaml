apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-app
  namespace: explorer-lab
  labels:
    app: explorer-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explorer-app
  template:
    metadata:
      labels:
        app: explorer-app
        version: "1.0.0"
    spec:
      containers:
        - name: explorer-app
          image: k8s-explorer-app:1.0.0
          # Use local image (built inside Minikube's Docker daemon)
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: NODE_ENV
              value: "production"
          # ----------------------------------------------------------
          # Probes — Kubernetes uses these to manage container health
          # ----------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          # ----------------------------------------------------------
          # Resource limits — important for scheduling & stability
          # ----------------------------------------------------------
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
