# ╔══════════════════════════════════════════════════════════════════╗
# ║  Exercise 1 — Scaling and Load Balancing                       ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# GOAL:  Observe how Kubernetes distributes traffic across replicas.
#
# INSTRUCTIONS:
#   1. Apply this file:
#        kubectl apply -f k8s/exercises/01-scaling.yaml
#
#   2. Watch the pods come up:
#        kubectl get pods -n explorer-lab -w
#
#   3. In another terminal, start port-forwarding if not already running:
#        bash scripts/port-forward.sh
#
#      Then in a third terminal, repeatedly curl the service and
#      watch the 'hostname' value change — that's load balancing!
#        for i in $(seq 1 20); do curl -s http://localhost:8080 | grep hostname; done
#
#   4. Try scaling further from the command line:
#        kubectl scale deployment explorer-app -n explorer-lab --replicas=5
#
# QUESTIONS TO CONSIDER:
#   - What happened to existing traffic while new pods were starting?
#   - Why might the hostname NOT change on every single request?
#   - How does the readinessProbe affect when a new pod starts
#     receiving traffic?
# ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-app
  namespace: explorer-lab
  labels:
    app: explorer-app
spec:
  replicas: 3           # <-- Changed from 1 → 3
  selector:
    matchLabels:
      app: explorer-app
  template:
    metadata:
      labels:
        app: explorer-app
        version: "1.0.0"
    spec:
      containers:
        - name: explorer-app
          image: k8s-explorer-app:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
