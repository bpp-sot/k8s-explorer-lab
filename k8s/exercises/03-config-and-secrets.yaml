# ╔══════════════════════════════════════════════════════════════════╗
# ║  Exercise 3 — ConfigMaps and Secrets                           ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# GOAL:  Externalise configuration from the container image using
#        ConfigMaps and Secrets — a key Kubernetes pattern.
#
# INSTRUCTIONS:
#   1. Apply this file:
#        kubectl apply -f k8s/exercises/03-config-and-secrets.yaml
#
#   2. Verify the ConfigMap and Secret were created:
#        kubectl get configmap app-config -n explorer-lab -o yaml
#        kubectl get secret app-secret -n explorer-lab -o yaml
#
#   3. Notice that the Secret values are base64-encoded. Decode one:
#        kubectl get secret app-secret -n explorer-lab -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#
#   4. Check the running pod to see the injected environment:
#        kubectl exec -n explorer-lab deploy/explorer-app -- env | grep -E 'APP_|DB_'
#
# QUESTIONS TO CONSIDER:
#   - Why should configuration be separate from the container image?
#   - Are Kubernetes Secrets truly "secret"? What additional measures
#     would you take in a production environment?
#   - How does this relate to the Twelve-Factor App methodology?
#   - What happens to running pods when you update a ConfigMap?
# ──────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: explorer-lab
data:
  APP_VERSION: "3.0.0"
  NODE_ENV: "staging"
  LOG_LEVEL: "debug"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: explorer-lab
type: Opaque
# Values are base64-encoded (echo -n 'value' | base64)
data:
  DB_PASSWORD: czNjcjN0LXBhc3N3b3Jk       # s3cr3t-password
  API_KEY: ZGVtby1hcGkta2V5LTEyMzQ1      # demo-api-key-12345

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-app
  namespace: explorer-lab
  labels:
    app: explorer-app
  annotations:
    kubernetes.io/change-cause: "v3.0.0 — inject config via ConfigMap and Secret"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: explorer-app
  template:
    metadata:
      labels:
        app: explorer-app
        version: "3.0.0"
    spec:
      containers:
        - name: explorer-app
          image: k8s-explorer-app:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          # ---------------------------------------------------
          # Configuration from ConfigMap
          # ---------------------------------------------------
          envFrom:
            - configMapRef:
                name: app-config
          # ---------------------------------------------------
          # Secrets as individual environment variables
          # ---------------------------------------------------
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: API_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
