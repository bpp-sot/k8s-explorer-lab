# ╔══════════════════════════════════════════════════════════════════╗
# ║  Exercise 4 — Self-Healing and Resilience                      ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# GOAL:  Observe how Kubernetes automatically recovers from failures.
#        This exercise does NOT require applying a new manifest —
#        you'll break things on purpose using kubectl commands!
#
# PREREQUISITES:
#   Make sure you have a deployment running (any previous exercise).
#   Check with:  kubectl get pods -n explorer-lab
#
# ──────────────────────────────────────────────────────────────────
#
# EXPERIMENT 1: Delete a pod
#   1. Watch pods in one terminal:
#        kubectl get pods -n explorer-lab -w
#
#   2. In another terminal, delete a pod:
#        kubectl delete pod -n explorer-lab $(kubectl get pods -n explorer-lab -o jsonpath='{.items[0].metadata.name}')
#
#   3. Observe: a replacement pod is created almost immediately.
#      ➜ Why? The Deployment controller's reconciliation loop
#        ensures the DESIRED state (replicas: N) matches ACTUAL state.
#
# ──────────────────────────────────────────────────────────────────
#
# EXPERIMENT 2: Simulate a crash
#   1. Exec into a running pod:
#        kubectl exec -it -n explorer-lab deploy/explorer-app -- sh
#
#   2. Kill the Node process:
#        kill 1
#
#   3. Watch the pod restart (RESTARTS column increments):
#        kubectl get pods -n explorer-lab
#
#   4. Check the events to see what Kubernetes detected:
#        kubectl describe pod -n explorer-lab $(kubectl get pods -n explorer-lab -o jsonpath='{.items[0].metadata.name}') | tail -20
#
# ──────────────────────────────────────────────────────────────────
#
# EXPERIMENT 3: Resource pressure (optional/advanced)
#   1. Apply the resource-constrained deployment below, then
#      hit the /compute endpoint repeatedly to see how K8s responds
#      when a container exceeds its memory limit.
#
# QUESTIONS TO CONSIDER:
#   - What is the difference between a pod restart and a pod
#     replacement?
#   - How does the restartPolicy setting affect this behaviour?
#   - What is a CrashLoopBackOff and when would you see it?
#   - How would you design your application to be resilient to
#     these restarts (hint: think about state)?
# ──────────────────────────────────────────────────────────────────

# Optional: a deployment with very tight resource limits to trigger OOMKilled
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-app-constrained
  namespace: explorer-lab
  labels:
    app: explorer-app-constrained
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explorer-app-constrained
  template:
    metadata:
      labels:
        app: explorer-app-constrained
    spec:
      containers:
        - name: explorer-app
          image: k8s-explorer-app:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "constrained"
          resources:
            requests:
              cpu: "50m"
              memory: "24Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"      # Deliberately tight!
